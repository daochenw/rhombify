<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rhombify</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    :root {
      --hud-margin: 100px;
      --layout-scale: 1;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f8f6;
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    #board {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 0;
      background: #f8f8f6;
    }

    #iteration {
      position: fixed;
      top: calc(var(--hud-margin) * var(--layout-scale));
      left: 50%;
      z-index: 1;
      transform: translateX(-50%) scale(var(--layout-scale));
      transform-origin: top center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-family: "Latin Modern Roman", "Computer Modern Serif", "CMU Serif", "STIX Two Text", "Times New Roman", serif;
      font-size: 30px;
      line-height: 1;
      text-align: center;
      color: #080808;
      white-space: nowrap;
    }

    #controls {
      position: fixed;
      bottom: calc(var(--hud-margin) * var(--layout-scale));
      left: 50%;
      z-index: 1;
      transform: translateX(-50%) scale(var(--layout-scale));
      transform-origin: bottom center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      font-family: "Latin Modern Roman", "Computer Modern Serif", "CMU Serif", "STIX Two Text", "Times New Roman", serif;
      color: #080808;
      white-space: nowrap;
    }

    #pause {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    #pause span {
      width: 6px;
      height: 30px;
      border-radius: 999px;
      background: #080808;
    }

    #pause.paused {
      opacity: 0.45;
    }

    #speed {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 30px;
    }

    #speed button {
      padding: 2px 1px;
      border: 0;
      border-bottom: 1px solid transparent;
      background: transparent;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    #speed button.active {
      border-bottom-color: #080808;
    }

    .times {
      font-size: 0.8em;
    }

    .cell {
      fill: #f8f8f6;
      stroke: #080808;
      stroke-width: 1.5;
    }
    .edge {
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .edge.red {
      stroke: #c55c5c;
    }
    .edge.blue {
      stroke: #6b8ac2;
    }

    .stone {
      position: absolute;
      z-index: 1;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .stone.dimmed {
      opacity: 0.2;
    }
    .stone.red {
      background: radial-gradient(circle at 35% 30%, #de8484, #c55c5c 70%);
    }
    .stone.blue {
      background: radial-gradient(circle at 35% 30%, #93b1e0, #6b8ac2 70%);
    }

    .winning-line-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: visible;
      pointer-events: none;
    }

    .winning-edge {
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 5;
    }

    .winning-edge.red {
      stroke: #c55c5c;
    }

    .winning-edge.blue {
      stroke: #6b8ac2;
    }
  </style>
</head>
<body>
  <div id="iteration">
    <span>Games completed</span>
    <span id="game-count">0</span>
  </div>
  <div id="controls">
    <button id="pause" type="button" aria-label="Pause play" aria-pressed="false" title="Pause">
      <span></span>
      <span></span>
    </button>
    <div id="speed">
      <button type="button" data-speed="0.5" aria-pressed="false">0.5<span class="times">×</span></button>
      <button type="button" data-speed="1" class="active" aria-pressed="true">1<span class="times">×</span></button>
      <button type="button" data-speed="1.5" aria-pressed="false">1.5<span class="times">×</span></button>
    </div>
  </div>
  <div id="board"></div>

  <script type="module">
    import { stones, nextColor, place, reset, showWinningLine } from './board.js';
    import { chooseMove, reward } from './strategies.js';

    const baseWait = 150;
    const winDisplayWait = 3000;
    const root = document.documentElement;
    const board = document.getElementById('board');
    const iteration = document.getElementById('iteration');
    const controls = document.getElementById('controls');
    const gameCount = document.getElementById('game-count');
    const pauseButton = document.getElementById('pause');
    const speedButtons = document.querySelectorAll('#speed button');
    const layoutPad = 16;
    const layoutGap = 64;
    let game = 0;
    let speed = 1;
    let paused = false;
    let timer = null;
    let queued = null;
    let queuedDelay = 0;
    let timerDelay = 0;
    let timerStartedAt = 0;
    let layoutFrame = null;

    function wait() {
      return baseWait / speed;
    }

    function fitLayout() {
      root.style.setProperty('--layout-scale', 1);

      const boardRect = board.getBoundingClientRect();
      const iterationRect = iteration.getBoundingClientRect();
      const controlsRect = controls.getBoundingClientRect();
      const topHudExtent = iterationRect.bottom;
      const bottomHudExtent = window.innerHeight - controlsRect.top;
      const requiredWidth = Math.max(boardRect.width, iterationRect.width, controlsRect.width);
      const requiredHeight = boardRect.height + 2 * Math.max(topHudExtent, bottomHudExtent);
      const scale = Math.min(
        1,
        Math.max(1, window.innerWidth - layoutPad * 2) / requiredWidth,
        Math.max(1, window.innerHeight - layoutGap * 2) / requiredHeight
      );

      root.style.setProperty('--layout-scale', scale);
    }

    function queueFitLayout() {
      if (layoutFrame !== null) return;

      layoutFrame = requestAnimationFrame(() => {
        layoutFrame = null;
        fitLayout();
      });
    }

    function runQueued() {
      timer = null;
      const next = queued;
      queued = null;
      queuedDelay = 0;
      if (next) next();
    }

    function startTimer() {
      timerDelay = queuedDelay;
      timerStartedAt = performance.now();
      timer = setTimeout(runQueued, timerDelay);
    }

    function schedule(fn, delay = wait()) {
      queued = fn;
      queuedDelay = delay;
      clearTimeout(timer);
      timer = null;
      if (!paused) {
        startTimer();
      }
    }

    pauseButton.addEventListener('click', () => {
      paused = !paused;
      pauseButton.classList.toggle('paused', paused);
      pauseButton.setAttribute('aria-pressed', paused);
      pauseButton.setAttribute('aria-label', paused ? 'Resume play' : 'Pause play');
      pauseButton.title = paused ? 'Resume' : 'Pause';

      if (paused) {
        if (timer !== null) {
          queuedDelay = Math.max(0, timerDelay - (performance.now() - timerStartedAt));
        }
        clearTimeout(timer);
        timer = null;
      } else {
        schedule(queued || step, queued ? queuedDelay : wait());
      }
    });

    speedButtons.forEach(button => {
      button.addEventListener('click', () => {
        speed = Number(button.dataset.speed);
        speedButtons.forEach(b => {
          b.classList.toggle('active', b === button);
          b.setAttribute('aria-pressed', b === button);
        });
      });
    });

    function winningPath(color) {
      const n = Math.sqrt(stones.length);
      const stack = [];
      const seen = new Set();
      const parent = new Map();
      for (let i = 0; i < n; i++) {
        const idx = color === 'red' ? i : i * n;
        if (stones[idx] === color) {
          stack.push(idx);
          parent.set(idx, null);
        }
      }

      while (stack.length) {
        const idx = stack.pop();
        if (seen.has(idx)) continue;
        seen.add(idx);

        const row = Math.floor(idx / n);
        const col = idx % n;
        if (color === 'red' ? row === n - 1 : col === n - 1) {
          const path = [];
          let cursor = idx;
          while (cursor !== null) {
            path.push(cursor);
            cursor = parent.get(cursor);
          }
          return path.reverse();
        }

        for (const [dr, dc] of [[-1, 0], [-1, 1], [0, -1], [0, 1], [1, -1], [1, 0]]) {
          const r = row + dr;
          const c = col + dc;
          const next = r * n + c;
          if (r >= 0 && r < n && c >= 0 && c < n && stones[next] === color && !parent.has(next)) {
            parent.set(next, idx);
            stack.push(next);
          }
        }
      }
      return null;
    }

    // Game loop: two players, each picking a move via the current strategy.
    function step() {
      const color = nextColor;
      const idx = chooseMove(stones, color);
      if (idx === null) return; // board full

      place(idx);
      const path = winningPath(color);
      if (path) {
        showWinningLine(path, color);
        reward(color);
        game++;
        gameCount.textContent = game;
        fitLayout();
        schedule(() => {
          reset();
          schedule(step);
        }, winDisplayWait);
        return;
      }

      schedule(step);
    }

    fitLayout();
    window.addEventListener('resize', queueFitLayout);
    document.fonts?.ready.then(fitLayout);
    schedule(step);
  </script>
</body>
</html>
