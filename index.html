<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rhombify</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    #board {
      position: absolute;
      top: 50%;
      left: 50%;
      background: #ffffff;
    }

    .cell {
      fill: #ffffff;
      stroke: #080808;
      stroke-width: 1.5;
    }
    .edge {
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .edge.red {
      stroke: #b12525;
    }
    .edge.blue {
      stroke: #3963ad;
    }

    .stone {
      position: absolute;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .stone.red {
      background: radial-gradient(circle at 35% 30%, #d35b5b, #b12525 70%);
    }
    .stone.blue {
      background: radial-gradient(circle at 35% 30%, #6f97d6, #3963ad 70%);
    }
  </style>
</head>
<body>
  <div id="board"></div>

  <script type="module">
    import { stones, nextColor, place } from './board.js';
    import { chooseMove } from './strategies.js';

    // Game loop: two players, each picking a move via the current strategy,
    // one stone every 3 seconds. First stone 3 seconds after load.
    function step() {
      const idx = chooseMove(stones, nextColor);
      if (idx === null) return; // board full

      place(idx);
      setTimeout(step, 3000);
    }

    setTimeout(step, 3000);
  </script>
</body>
</html>
