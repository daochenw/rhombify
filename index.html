<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rhombify</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    :root {
      --hud-margin: 100px;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    #board {
      position: absolute;
      top: 50%;
      left: 50%;
      background: #ffffff;
    }

    #iteration {
      position: fixed;
      top: var(--hud-margin);
      left: 50%;
      transform: translateX(-50%);
      font-family: "Latin Modern Roman", "Computer Modern Serif", "CMU Serif", "STIX Two Text", "Times New Roman", serif;
      font-size: 20px;
      color: #080808;
      white-space: nowrap;
    }

    #speed {
      position: fixed;
      bottom: var(--hud-margin);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: "Latin Modern Roman", "Computer Modern Serif", "CMU Serif", "STIX Two Text", "Times New Roman", serif;
      font-size: 20px;
      color: #080808;
      white-space: nowrap;
    }

    #speed button {
      padding: 2px 1px;
      border: 0;
      border-bottom: 1px solid transparent;
      background: transparent;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    #speed button.active {
      border-bottom-color: #080808;
    }

    .times {
      font-size: 0.8em;
    }

    .cell {
      fill: #ffffff;
      stroke: #080808;
      stroke-width: 1.5;
    }
    .edge {
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .edge.red {
      stroke: #c55c5c;
    }
    .edge.blue {
      stroke: #6b8ac2;
    }

    .stone {
      position: absolute;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .stone.red {
      background: radial-gradient(circle at 35% 30%, #de8484, #c55c5c 70%);
    }
    .stone.blue {
      background: radial-gradient(circle at 35% 30%, #93b1e0, #6b8ac2 70%);
    }
  </style>
</head>
<body>
  <div id="iteration">Games completed: 0</div>
  <div id="speed">
    <span>Speed setting:</span>
    <button type="button" data-speed="0.5" aria-pressed="false">0.5<span class="times">×</span></button>
    <button type="button" data-speed="1" class="active" aria-pressed="true">1<span class="times">×</span></button>
    <button type="button" data-speed="1.5" aria-pressed="false">1.5<span class="times">×</span></button>
  </div>
  <div id="board"></div>

  <script type="module">
    import { stones, nextColor, place, reset } from './board.js';
    import { chooseMove, reward } from './strategies.js';

    const baseWait = 150;
    const iteration = document.getElementById('iteration');
    const speedButtons = document.querySelectorAll('#speed button');
    let game = 0;
    let speed = 1;

    function wait() {
      return baseWait / speed;
    }

    speedButtons.forEach(button => {
      button.addEventListener('click', () => {
        speed = Number(button.dataset.speed);
        speedButtons.forEach(b => {
          b.classList.toggle('active', b === button);
          b.setAttribute('aria-pressed', b === button);
        });
      });
    });

    function won(color) {
      const n = Math.sqrt(stones.length);
      const stack = [];
      const seen = new Set();
      for (let i = 0; i < n; i++) {
        const idx = color === 'red' ? i : i * n;
        if (stones[idx] === color) stack.push(idx);
      }

      while (stack.length) {
        const idx = stack.pop();
        if (seen.has(idx)) continue;
        seen.add(idx);

        const row = Math.floor(idx / n);
        const col = idx % n;
        if (color === 'red' ? row === n - 1 : col === n - 1) return true;

        for (const [dr, dc] of [[-1, 0], [-1, 1], [0, -1], [0, 1], [1, -1], [1, 0]]) {
          const r = row + dr;
          const c = col + dc;
          const next = r * n + c;
          if (r >= 0 && r < n && c >= 0 && c < n && stones[next] === color) stack.push(next);
        }
      }
      return false;
    }

    // Game loop: two players, each picking a move via the current strategy.
    function step() {
      const color = nextColor;
      const idx = chooseMove(stones, color);
      if (idx === null) return; // board full

      place(idx);
      if (won(color)) {
        reward(color);
        setTimeout(() => {
          game++;
          iteration.textContent = 'Games completed: ' + game;
          reset();
          setTimeout(step, wait());
        }, wait());
        return;
      }

      setTimeout(step, wait());
    }

    setTimeout(step, wait());
  </script>
</body>
</html>
